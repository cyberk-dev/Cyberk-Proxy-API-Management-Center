services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-cyberk/cli-proxy-api-ratelimit:latest}
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      # Config file (must contain both cliproxy fields + `ratelimit:` section).
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      # Auth directory (unchanged from upstream).
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      # Logs (unchanged from upstream).
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
      # Rate-limit state — writable directory so plugin can snapshot counter
      # to survive restart. Host dir is auto-created by compose.
      - ${CLI_PROXY_STATE_PATH:-./state}:/CLIProxyAPI/state
    command: ["./CLIProxyAPI", "-config", "/CLIProxyAPI/config.yaml", "-state", "/CLIProxyAPI/state/ratelimit-state.json"]
    restart: unless-stopped
